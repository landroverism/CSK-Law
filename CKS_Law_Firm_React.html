// ── ENHANCED INTERSECTION OBSERVER HOOK ──────────────────────────────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.12, rootMargin: '0px 0px -60px 0px' }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

// Animated count-up for stats
function useCountUp(target, duration = 1800, start = false) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    if (!start) return;
    let frame; const t0 = performance.now();
    const tick = (t) => {
      const p = Math.min((t - t0) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(Math.floor(eased * target));
      if (p < 1) frame = requestAnimationFrame(tick);
      else setValue(target);
    };
    frame = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(frame);
  }, [target, duration, start]);
  return value;
}

// ── STATS BAR ────────────────────────────────────────────────────────────
function StatsBar() {
  const [visible, setVisible] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((es) => es.forEach((e) => e.isIntersecting && setVisible(true)), { threshold: 0.3 });
    io.observe(el); return () => io.disconnect();
  }, []);

  const three = useCountUp(3, 1400, visible);
  const pct = useCountUp(100, 1800, visible);

  const stats = [
    { num: `${three}+`, label: 'Practice Areas' },
    { num: 'EA',        label: 'Regional Reach' },
    { num: 'LSK',       label: 'Registered Advocates' },
    { num: `${pct}%`,   label: 'Client Commitment' },
  ];

  return (
    <Box
      ref={ref}
      sx={{
        background: WHITE,
        borderTop: `1px solid ${'rgba(11,27,46,0.08)'}`,
        borderBottom: `1px solid ${'rgba(11,27,46,0.08)'}`,
        px: '5vw', py: { xs: 4, md: 5 },
        position: 'relative',
        '&::before': {
          content: '""', position: 'absolute', top: 0, left: '15%', right: '15%',
          height: 2,
          background: `linear-gradient(90deg, transparent, ${GOLD}, transparent)`,
        },
      }}
    >
      <Grid container spacing={0}>
        {stats.map((s, i) => (
          <Grid item xs={6} md={3} key={s.label}>
            <Box
              sx={{
                textAlign: 'center', px: 2, py: 1,
                borderRight: { md: i < 3 ? '1px solid rgba(11,27,46,0.08)' : 'none' },
                position: 'relative',
                animation: visible ? `fadeUp 0.8s ${0.1 * i}s both` : 'none',
                '&:hover .stat-num': { color: GOLD_DEEP, transform: 'translateY(-3px)' },
              }}
            >
              <Box
                className="stat-num"
                sx={{
                  fontFamily: "'Cormorant Garamond', serif",
                  fontSize: { xs: '2.4rem', md: '3rem' }, fontWeight: 300,
                  color: GOLD, lineHeight: 1, mb: 0.8,
                  transition: 'all 0.35s',
                  display: 'inline-block',
                }}
              >
                {s.num}
              </Box>
              <Typography sx={{ fontSize: '0.66rem', letterSpacing: '0.25em', textTransform: 'uppercase', color: 'rgba(11,27,46,0.55)' }}>
                {s.label}
              </Typography>
            </Box>
          </Grid>
        ))}
      </Grid>
    </Box>
  );
}

// ── SCROLL PROGRESS ──────────────────────────────────────────────────────
function ScrollProgress() {
  useEffect(() => {
    const bar = document.getElementById('scrollProgress');
    if (!bar) return;
    const onScroll = () => {
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      bar.style.width = pct + '%';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return null;
}
